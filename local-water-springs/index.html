<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Free Flow — Local Free Water Springs</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <h1>Free Flow</h1>
      <p class="tagline">Find free, publicly accessible water springs near you.</p>
    </div>
    <div class="controls">
      <label for="city-select">Region</label>
      <select id="city-select" aria-label="Choose a region"></select>
      <button type="button" id="locate-btn" class="locate-btn" title="Sort by distance from my location">
        <span aria-hidden="true">&#128205;</span> Near me
      </button>
      <div class="filters" role="tablist" aria-label="Spring type filter">
        <button type="button" class="filter-btn active" data-filter="all" role="tab" aria-selected="true">All</button>
        <button type="button" class="filter-btn" data-filter="artesian" role="tab" aria-selected="false">Artesian</button>
        <button type="button" class="filter-btn" data-filter="mineral" role="tab" aria-selected="false">Mineral</button>
        <button type="button" class="filter-btn" data-filter="spring" role="tab" aria-selected="false">Wild spring</button>
        <button type="button" class="filter-btn" data-filter="fountain" role="tab" aria-selected="false">Fountain</button>
      </div>
    </div>
  </header>

  <main class="app-main">
    <section class="sidebar" aria-label="Springs list">
      <div class="city-meta">
        <h2 id="city-name">—</h2>
        <p id="city-blurb"></p>
        <p id="geo-status" class="geo-status" aria-live="polite"></p>
      </div>
      <div id="springs-list" class="springs-list"></div>
    </section>
    <section class="map-container" aria-label="Map of springs">
      <div id="map"></div>
    </section>
  </main>

  <footer class="app-footer">
    <span>Map data &copy; <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a> contributors</span>
    <span>Always verify water safety with local authorities before drinking untreated spring water.</span>
  </footer>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
